<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Payasos</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        max-width: 600px;
        margin: auto;
      }
      .form-group {
        margin-bottom: 10px;
      }
      input {
        padding: 8px;
        width: 100%;
        box-sizing: border-box;
      }
      button {
        padding: 10px 15px;
        background-color: #ff4757;
        color: white;
        border: none;
        cursor: pointer;
      }
      button:hover {
        background-color: #ff6b81;
      }
      .payaso-item {
        background: #f1f2f6;
        margin: 10px 0;
        padding: 10px;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <h1>Registro de Payasos</h1>

    <form id="payasoForm">
      <div class="form-group">
        <input type="text" id="name" placeholder="Nombre del payaso" required />
      </div>
      <div class="form-group">
        <input
          type="email"
          id="email"
          placeholder="Correo electrónico"
          required
        />
      </div>
      <div class="form-group">
        <input
          type="text"
          id="arma"
          placeholder="Arma (ej. Tarta, Flor de agua)"
          required
        />
      </div>
      <button type="submit">Registrar Payaso</button>
    </form>

    <hr />

    <h2>Lista de Payasos Registrados</h2>
    <div id="listaPayasos"></div>

    <script>
      const API_URL = "http://localhost:3000/payasos";

      // 1. FUNCIÓN PARA OBTENER Y MOSTRAR LOS PAYASOS (GET)
      async function cargarPayasos() {
        try {
          const response = await fetch(API_URL);
          const payasos = await response.json();

          const contenedor = document.getElementById("listaPayasos");
          contenedor.innerHTML = ""; // Limpiamos la lista antes de actualizarla

          payasos.forEach((payaso) => {
            const div = document.createElement("div");
            div.className = "payaso-item";
            div.innerHTML = `<strong>${payaso.name}</strong> - 📧 ${payaso.email} - 🔫 Arma: ${payaso.arma}`;
            contenedor.appendChild(div);
          });
        } catch (error) {
          console.error("Error al cargar los payasos:", error);
        }
      }

      // 2. FUNCIÓN PARA REGISTRAR UN NUEVO PAYASO (POST)
      document
        .getElementById("payasoForm")
        .addEventListener("submit", async function (event) {
          event.preventDefault(); // Evita que la página se recargue al enviar el formulario

          // Capturamos los datos del formulario
          const nuevoPayaso = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            arma: document.getElementById("arma").value,
          };

          try {
            const response = await fetch(API_URL, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(nuevoPayaso), // Convertimos el objeto JS a JSON
            });

            if (response.ok) {
              alert("¡Payaso registrado con éxito!");
              document.getElementById("payasoForm").reset(); // Limpiamos el formulario
              cargarPayasos(); // Recargamos la lista para ver al nuevo
            } else {
              const errorData = await response.json();
              alert("Error: " + errorData.error);
            }
          } catch (error) {
            console.error("Error al registrar:", error);
            alert("Error de conexión con el servidor.");
          }
        });

      // 3. CARGAMOS LA LISTA AL ABRIR LA PÁGINA
      cargarPayasos();
    </script>
  </body>
</html>
